<header class="app-header">
  <div class="header-content">
    <div class="logo">
        <a routerLink="/auctions" class="logo-link">
            <img src="/LOGO_ALEDROGO.png" alt="Alledrogo" class="app-logo-img">
        </a>
    </div>
    <nav class="nav-menu">
        <a routerLink="/auctions" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-link">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
            Katalog Aukcji
        </a>
            <a routerLink="/add-auction" routerLinkActive="active" class="nav-link highlight-link">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            Wystaw przedmiot
        </a>
        <a routerLink="/my-auctions" routerLinkActive="active" class="nav-link">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 7H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"></path><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></svg>
            Moje aukcje
        </a>
        <a routerLink="/my-bids" routerLinkActive="active" class="nav-link">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
            Moje licytacje
        </a>
    </nav>

    <div class="auth-section">
        <ng-container *ngIf="currentUser; else guestTemplate">
            <a routerLink="/profile" class="user-profile" title="Moje konto">
                <div class="user-avatar">
                    {{ currentUser.username.charAt(0) | uppercase }}
                </div>
                <span class="user-info">{{ currentUser.username }}</span>
            </a>
            <button (click)="logout()" class="auth-btn logout-btn" title="Wyloguj się">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                <span class="btn-text">Wyloguj</span>
            </button>
        </ng-container>

        <ng-template #guestTemplate>
            <a routerLink="/login" class="auth-btn login-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path><polyline points="10 17 15 12 10 7"></polyline><line x1="15" y1="12" x2="3" y2="12"></line></svg>
                Zaloguj się
            </a>
        </ng-template>
    </div>
</div>
</header>
