<div class="register-container">
  <h2>Zarejestruj się</h2>

  <form (ngSubmit)="onSubmit()" #registerForm="ngForm">
    
    <div class="form-group">
      <label for="username">Nazwa użytkownika:</label>
      <input 
        type="text" 
        id="username"
        name="username" 
        [(ngModel)]="registerData.username" 
        #username="ngModel"
        required 
        minlength="3"
        maxlength="20"
        class="form-control" />
      
      <div *ngIf="username.touched && username.invalid" class="error-text">
        <span *ngIf="username.errors?.['required']">Nazwa użytkownika jest wymagana.</span>
        <span *ngIf="username.errors?.['minlength']">Nazwa musi mieć minimum 3 znaki.</span>
      </div>
    </div>

    <div class="form-group">
      <label for="email">Adres E-mail:</label>
      <input 
        type="email" 
        id="email"
        name="email" 
        [(ngModel)]="registerData.email" 
        #email="ngModel"
        required 
        email
        class="form-control" />
      
      <div *ngIf="email.touched && email.invalid" class="error-text">
        <span *ngIf="email.errors?.['required']">Adres e-mail jest wymagany.</span>
        <span *ngIf="email.errors?.['email']">Niepoprawny format adresu e-mail.</span>
      </div>
    </div>

    <div class="form-group">
      <label for="password">Hasło:</label>
      <input 
        type="password" 
        id="password"
        name="password" 
        [(ngModel)]="registerData.password" 
        #password="ngModel"
        required 
        minlength="6"
        class="form-control" />
      
      <div *ngIf="password.touched && password.invalid" class="error-text">
        <span *ngIf="password.errors?.['required']">Hasło jest wymagane.</span>
        <span *ngIf="password.errors?.['minlength']">Za mało znaków (minimum 6).</span>
      </div>
    </div>

    <div class="button-group">
      <button type="submit" [disabled]="registerForm.invalid" class="btn-submit">
        Stwórz konto
      </button>
      <button type="button" routerLink="/login" class="btn-cancel">Anuluj</button>
    </div>

  </form>
</div>
