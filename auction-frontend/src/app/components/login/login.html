<div class="login-container">
  <h2>Zaloguj się</h2>

  <div *ngIf="error" class="error-message">{{ error }}</div>

  <form (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="username">Nazwa użytkownika:</label>
      <input type="text" id="username" name="username" [(ngModel)]="loginData.username" [disabled]="loading" required />
    </div>

    <div class="form-group">
      <label for="password">Hasło:</label>
      <input type="password" id="password" name="password" [(ngModel)]="loginData.password" [disabled]="loading" required />
    </div>

    <div class="button-group">
      <button type="submit" class="btn-submit" [disabled]="loading">{{ loading ? 'Logowanie...' : 'Zaloguj się' }}</button>
      <button type="button" class="btn-cancel" routerLink="/auctions" [disabled]="loading">Anuluj</button>
      <button type="button" class="btn-register" routerLink="/register" [disabled]="loading">Rejestracja</button>
    </div>
  </form>
</div>
