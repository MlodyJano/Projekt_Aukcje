version: "3.9"

services:

  # ─────────────────────────────────────────────
  # Backend — ASP.NET Core 10 API
  # ─────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auction-api
    ports:
      - "8080:8080"          # API dostępne pod localhost:8080
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
    volumes:
      - sqlite_data:/app/data       # Trwałe przechowywanie bazy SQLite
      - uploads_data:/app/uploads   # Trwałe przechowywanie zdjęć
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - auction-net

  # ─────────────────────────────────────────────
  # Frontend — Angular (build + Nginx)
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./auction-frontend
      dockerfile: Dockerfile.frontend
    container_name: auction-frontend
    ports:
      - "4200:80"            # Frontend dostępny pod localhost:4200
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - auction-net

volumes:
  sqlite_data:
    name: auction_sqlite_data
  uploads_data:
    name: auction_uploads_data

networks:
  auction-net:
    name: auction-network
    driver: bridge
